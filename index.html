<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Workout Tracker</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background:#f5f5f5; }
  .ex-card { border:1px solid #ccc; margin:10px 0; background:#fff; border-radius:6px; overflow:hidden; }
  .ex-header { display:flex; justify-content:space-between; align-items:center; padding:10px; cursor:pointer; background:#eee; }
  .ex-sets { display:none; padding:10px; }
  .ex-card.expanded .ex-sets { display:block; }
  .sets-grid-header, .set-row { display:grid; grid-template-columns:50px 100px 80px 80px; margin-bottom:5px; }
  .set-input { width:90%; }
  .meta-pill { background:#ddd; padding:2px 6px; margin-left:4px; border-radius:4px; font-size:0.85em; }
  .ex-status.complete { background:green; width:12px; height:12px; border-radius:50%; }
  .ex-status.partial { background:orange; width:12px; height:12px; border-radius:50%; }
  .next-week-box { margin-top:10px; padding:8px; background:#f0f0f0; border-radius:4px; font-size:0.9em; }
  .btn-green { padding:6px 12px; background:#4caf50; color:white; border:none; border-radius:4px; cursor:pointer; margin-right:10px; }
  .export-import { margin-bottom:20px; }
  textarea { width:100%; height:80px; margin-top:5px; }
</style>
</head>
<body>

<h1>Workout Tracker</h1>

<div class="export-import">
  <button class="btn-green" onclick="exportJSON()">Export JSON</button>
  <button class="btn-green" onclick="importJSON()">Import JSON</button>
  <textarea id="json-input" placeholder="Paste JSON here to import"></textarea>
</div>

<div id="week-label">Week 1</div>
<button onclick="changeWeek(-1)">← Prev Week</button>
<button onclick="changeWeek(1)">Next Week →</button>
<button class="btn-green" onclick="saveAll()">Save</button>
<button onclick="clearWeek()">Clear Week</button>

<div id="exercises-container">
  <!-- Exercises will be injected here -->
</div>

<script>
// ─────────────────────────────────────────────
// EXERCISE DATA (truncated example; paste full EXERCISES here)
// ─────────────────────────────────────────────
const EXERCISES = {
  'w10-d1': [
    {id:'w10d1_bench',name:'Barbell Bench Press', sets:5, reps:'3–5', rest:'3 min', suggest:160, compound:true},
    {id:'w10d1_incdb',name:'Incline DB Press', sets:4, reps:'8–10', rest:'90 sec', suggest:'32 ea.', compound:false},
  ]
  // add remaining exercises for w10-d2 to w10-d5 and prior weeks
};

// ─────────────────────────────────────────────
// STATE & STORAGE
// ─────────────────────────────────────────────
let currentWeek = 10;
let appData = {};

function storageKey(week) { return `workout_w${week}`; }

function loadData(week) {
  try { return JSON.parse(localStorage.getItem(storageKey(week))) || {}; } 
  catch(e) { return {}; }
}

function saveData(week, data) { localStorage.setItem(storageKey(week), JSON.stringify(data)); }

// ─────────────────────────────────────────────
// EXPORT / IMPORT
// ─────────────────────────────────────────────
function exportJSON() {
  const json = JSON.stringify(appData, null, 2);
  document.getElementById('json-input').value = json;
  alert('JSON copied to textarea! You can save it locally.');
}

function importJSON() {
  const txt = document.getElementById('json-input').value;
  try {
    appData = JSON.parse(txt);
    saveData(currentWeek, appData);
    renderAllExercises();
    alert('JSON imported successfully!');
  } catch(e) {
    alert('Invalid JSON!');
  }
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function parseTargetReps(repsStr) {
  const m = repsStr.match(/(\d+)/);
  return m ? parseInt(m[1]) : 5;
}

function buildExerciseCard(ex) {
  const data = appData;
  const card = document.createElement('div');
  card.className = 'ex-card';
  card.id = `card-${ex.id}`;
  const suggestDisplay = typeof ex.suggest==='number'?ex.suggest+' lbs':ex.suggest;
  card.innerHTML = `
    <div class="ex-header" onclick="toggleCard('${ex.id}')">
      <div>${ex.name}</div>
      <div>${ex.sets} sets · ${ex.reps}</div>
      <div>${suggestDisplay}</div>
    </div>
    <div class="ex-sets" id="sets-${ex.id}">
      ${Array.from({length:ex.sets},(_,i)=>`
        <div class="set-row">
          <div>Set ${i+1}</div>
          <input type="number" placeholder="${suggestDisplay}" id="${ex.id}_s${i}_wt" 
            value="${data[`${ex.id}_s${i}_wt`]||''}" oninput="onSetChange('${ex.id}',${ex.sets})">
          <input type="number" placeholder="${parseTargetReps(ex.reps)}" id="${ex.id}_s${i}_reps" 
            value="${data[`${ex.id}_s${i}_reps`]||''}" oninput="onSetChange('${ex.id}',${ex.sets})">
        </div>
      `).join('')}
    </div>
  `;
  return card;
}

function renderAllExercises() {
  appData = loadData(currentWeek);
  const container = document.getElementById('exercises-container');
  container.innerHTML = '';
  Object.values(EXERCISES).flat().forEach(ex=>{
    container.appendChild(buildExerciseCard(ex));
  });
}

// ─────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────
function toggleCard(id) {
  document.getElementById(`card-${id}`).classList.toggle('expanded');
}

function onSetChange(exId,numSets){
  for(let s=0;s<numSets;s++){
    const wEl=document.getElementById(`${exId}_s${s}_wt`);
    const rEl=document.getElementById(`${exId}_s${s}_reps`);
    if(wEl) appData[`${exId}_s${s}_wt`] = wEl.value;
    if(rEl) appData[`${exId}_s${s}_reps`] = rEl.value;
  }
  saveData(currentWeek, appData);
}

function saveAll() { saveData(currentWeek, appData); alert('Saved!'); }
function clearWeek() { if(confirm('Clear all data for this week?')) { appData={}; saveData(currentWeek, appData); renderAllExercises(); } }
function changeWeek(delta) { currentWeek+=delta; renderAllExercises(); document.getElementById('week-label').textContent=`Week ${currentWeek}`; }

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
renderAllExercises();
</script>

</body>
</html>
